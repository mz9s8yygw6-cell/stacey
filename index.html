
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黛西生活賣場SHOPEE｜社群推廣連結轉換</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="badge">黛西生活賣場SHOPEE</div>

      <h1>蝦皮推廣連結轉換</h1>

      <p class="subtitle">
        蝦皮分潤專屬優惠!!!
      </p>

      <label for="urlInput">蝦皮連結</label>
      <textarea
        id="urlInput"
        placeholder="請貼上蝦皮商品連結
        一行一個最多5個
        例如：&#10;https://tw.shp.ee/B1pFqNE3"
      ></textarea>

      

      <div class="buttons">
        <button id="convertBtn">產生推廣連結</button>
        <button id="clearBtn" class="secondary">清除</button>
      </div>

      <a
  class="line-btn"
  href="https://line.me/ti/g2/4rTPnjDWV3TC5m9hpXeDniSQnjlt1gSoUwS-UA?utm_source=invitation&utm_medium=link_copy&utm_campaign=default"
  target="_blank"
  rel="noopener noreferrer"
>
  加入 LINE 社群看更多優惠
</a>

      <p id="status"></p>

      <div id="resultArea" class="result-area"></div>
    </section>
  </main>

  <div id="toast">已複製</div>

  <script src="script.js"></script>
</body>
</html>
